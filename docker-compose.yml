version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: vongquay-db
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: vongquay123
      MONGO_INITDB_DATABASE: vongquay
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
