<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - Vòng Quay May Mắn</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/login.css">
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">🎰</div>
      <h1 class="login-title">Vòng Quay May Mắn</h1>
      <p class="login-sub">Đăng nhập để quản lý</p>

      <form id="loginForm" onsubmit="handleLogin(event)" autocomplete="off">
        <div class="field-group">
          <label class="field-label">Tài khoản</label>
          <div class="field-wrap">
            <span class="field-icon">👤</span>
            <input
              type="text"
              id="username"
              class="field-input"
              placeholder="Nhập tài khoản"
              autocomplete="username"
              required
            >
          </div>
        </div>

        <div class="field-group">
          <label class="field-label">Mật khẩu</label>
          <div class="field-wrap">
            <span class="field-icon">🔒</span>
            <input
              type="password"
              id="password"
              class="field-input"
              placeholder="Nhập mật khẩu"
              autocomplete="current-password"
              required
            >
            <button type="button" class="toggle-pw" onclick="togglePw()" id="togglePwBtn" tabindex="-1">
              <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>

        <label class="remember-row">
          <input type="checkbox" id="rememberMe" checked>
          <span class="remember-label">Ghi nhớ đăng nhập <span class="remember-note">(30 ngày)</span></span>
        </label>

        <div class="login-error" id="loginError"></div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span id="loginBtnText">Đăng nhập</span>
          <span id="loginBtnIcon">→</span>
        </button>
      </form>
    </div>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
